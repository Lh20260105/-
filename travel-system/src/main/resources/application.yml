server:
  port: 8080

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    url: jdbc:mysql://localhost:3306/travel_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# --- MyBatis-Plus 配置 (必须在最左侧顶格) ---
mybatis-plus:
  configuration:
    # 核心：开启这个，数据库的 image_url 才会自动给 Java 的 imageUrl 赋值
    map-underscore-to-camel-case: true
    # 打印 SQL 日志方便你排查
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# --- 文件上传配置 (同样顶格) ---
file:
  # 确保这个路径下真的有你的图片文件
  upload-path: D:/travel2/travel-system/files/